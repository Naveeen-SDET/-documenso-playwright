name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Start Documenso
        run: docker compose -f documenso-app/docker/testing/compose.yml up -d

      - name: Wait for app to be ready
        run: |
          echo "Waiting for http://localhost:3000..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && echo "App is up!" && break
            echo "Attempt $i/30 — retrying in 5s..."
            sleep 5
          done

      - name: Run tests
        run: pnpm exec playwright test --reporter=list
        env:
          BASE_URL: http://localhost:3000
          SENDER_EMAIL: sender@test.com
          SENDER_PASSWORD: Test1234!
          SIGNER_EMAIL: signer@test.com
          SIGNER_PASSWORD: Test1234!
          INBUCKET_URL: http://localhost:9000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
